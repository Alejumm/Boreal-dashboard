<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boreal S.A.S. — Recaudo Diario</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F0EDE8; font-family: 'Inter','Segoe UI',sans-serif; color: #2D2A26; min-height: 100vh; }
.header { background: #3D3A35; border-bottom: 1px solid #2A2825; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.header-title { font-size: 16px; font-weight: 700; color: #F5F2ED; }
.header-sub { font-size: 11px; color: #B0A89E; margin-top: 2px; }
.content { max-width: 960px; margin: 0 auto; padding: 20px 16px 40px; }

.summary-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.summary-card { background: #FAFAF8; border: 0.5px solid #D6D0C8; border-radius: 10px; padding: 14px 16px; flex: 1; min-width: 160px; }
.summary-label { font-size: 10px; color: #7A7570; margin-bottom: 4px; }
.summary-value { font-size: 18px; font-weight: 700; color: #2D2A26; }

.table-card { background: #FAFAF8; border: 0.5px solid #D6D0C8; border-radius: 12px; padding: 16px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 640px; }
th, td { padding: 10px 12px; text-align: right; font-size: 12px; white-space: nowrap; }
th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: #FAFAF8; }
thead th { color: #7A7570; font-weight: 600; font-size: 11px; border-bottom: 1px solid #D6D0C8; }
tbody tr:nth-child(odd) { background: #F0EDE8; }
tbody td { color: #4A4540; }
tbody td.zero { color: #B0A89E; }
tfoot td { font-weight: 700; color: #2D7D4A; border-top: 1px solid #D6D0C8; }
tfoot td:first-child { color: #2D2A26; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 3px solid #D6D0C8; border-top-color: #2D7D4A; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: #7A7570; }
.refresh-btn { background: #F0EDE8; border: 1px solid #D6D0C8; color: #7A7570; border-radius: 6px; padding: 5px 14px; font-size: 11px; cursor: pointer; }
.refresh-btn:hover { color: #2D2A26; border-color: #2D7D4A; }
.error-state { text-align: center; padding: 40px; color: #C0392B; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Boreal S.A.S.</div>
    <div class="header-sub" id="headerSub">Recaudo diario — Cargando...</div>
  </div>
  <button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar</button>
</div>

<div class="content" id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Leyendo datos del Sheet...</div>
  </div>
</div>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycby5sS_xRf39MD7QBsszxnpsVWyL5sOMReWobvp8fh_e3J-wNcMzbragmTsOVhthtDE4uQ/exec";

const fmt = n => "$" + Math.round(n).toLocaleString("es-CO");

async function cargarDatos() {
  try {
    const res  = await fetch(API_URL);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    render(json);
  } catch (err) {
    document.getElementById("content").innerHTML = `
      <div class="error-state">
        <p>Error al cargar los datos</p>
        <p style="font-size:11px;color:#7A7570;margin-top:8px">${err.message}</p>
        <button class="refresh-btn" onclick="cargarDatos()">Reintentar</button>
      </div>`;
  }
}

function render(data) {
  const d = data.diario;
  const asesores = Object.keys(d.porAsesor);

  document.getElementById("headerSub").textContent =
    "Recaudo diario — Semana en curso · " + data.mes_label;

  // Mejor día y mejor asesor
  let mejorDiaIdx = 0;
  d.totalesDia.forEach((v,i) => { if (v > d.totalesDia[mejorDiaIdx]) mejorDiaIdx = i; });

  let mejorAsesor = asesores[0], mejorAsesorTotal = 0;
  asesores.forEach(a => {
    const t = d.porAsesor[a].reduce((s,v)=>s+v,0);
    if (t > mejorAsesorTotal) { mejorAsesorTotal = t; mejorAsesor = a; }
  });

  let html = `
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-label">Total recaudado (semana)</div>
        <div class="summary-value">${fmt(d.totalSemana)}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Mejor día</div>
        <div class="summary-value">${d.dias[mejorDiaIdx]} — ${fmt(d.totalesDia[mejorDiaIdx])}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Asesor líder en recaudo</div>
        <div class="summary-value">${mejorAsesor} — ${fmt(mejorAsesorTotal)}</div>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Asesor</th>
            ${d.dias.map(dia => `<th>${dia}</th>`).join("")}
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${asesores.map(a => {
            const fila = d.porAsesor[a];
            const total = fila.reduce((s,v)=>s+v,0);
            return `<tr>
              <td>${a}</td>
              ${fila.map(v => `<td class="${v===0?'zero':''}">${v===0?'—':fmt(v)}</td>`).join("")}
              <td style="color:#2D7D4A;font-weight:600">${fmt(total)}</td>
            </tr>`;
          }).join("")}
        </tbody>
        <tfoot>
          <tr>
            <td>TOTAL</td>
            ${d.totalesDia.map(v => `<td>${fmt(v)}</td>`).join("")}
            <td>${fmt(d.totalSemana)}</td>
          </tr>
        </tfoot>
      </table>
    </div>`;

  document.getElementById("content").innerHTML = html;
}

cargarDatos();
</script>
</body>
</html>
